name: Build FFmpeg RPM

on:
  schedule:
    - cron: '0 2 * * 0' # Runs at 02:00 UTC every Sunday
  workflow_dispatch:    # Allows you to click "Run" manually

# CRITICAL: This gives the action permission to push the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-repo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and Run Builder
        run: |
          mkdir artifacts
          # Build the image
          docker build -t ffmpeg-builder .
          
          # Run the build
          docker run --rm \
            -v $PWD:/workspace \
            -v $PWD/artifacts:/output \
            ffmpeg-builder

      - name: Create DNF Repo
        run: |
          mkdir deploy-repo
          mv artifacts/*.rpm deploy-repo/
          
          # OPTIMIZATION: Reuse your builder image.
          # It already has 'createrepo_c' installed, so this is instant.
          docker run --rm \
            -v $PWD/deploy-repo:/repo \
            ffmpeg-builder \
            createrepo_c /repo

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-repo
          force_orphan: true # Wipes history every time (saves space)