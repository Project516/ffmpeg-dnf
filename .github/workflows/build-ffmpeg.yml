name: Repackage FFmpeg Binary

on:
  schedule:
    - cron: '0 2 * * 0' # Weekly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repackage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM Build Tools
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Download BtbN Build
        run: |
          # Download the specific GPL Linux64 build
          wget -O ffmpeg-master-latest-linux64-gpl.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz

      - name: Build RPM
        run: |
          # 1. Setup Directories
          mkdir -p rpmbuild/{SOURCES,SPECS,RPMS,SRPMS,BUILD,BUILDROOT}
          
          # 2. Move Sources
          cp ffmpeg-master-latest-linux64-gpl.tar.xz rpmbuild/SOURCES/
          cp ffmpeg-bin.spec rpmbuild/SPECS/
          
          # 3. Define Date for Versioning
          DATE=$(date +%Y%m%d)
          
          # 4. Build
          rpmbuild --define "_topdir $(pwd)/rpmbuild" \
                   --define "_date $DATE" \
                   -bb rpmbuild/SPECS/ffmpeg-bin.spec

      - name: Create Repo Structure
        run: |
          mkdir deploy-repo
          cp rpmbuild/RPMS/x86_64/*.rpm deploy-repo/
          
          # We use a container just for createrepo_c to keep the host clean
          # or we can install 'createrepo-c' on ubuntu if available (it usually is)
          sudo apt-get install -y createrepo-c
          createrepo_c deploy-repo

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy-repo
          force_orphan: true